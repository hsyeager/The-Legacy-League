alias("CPV", "cpv", "cabo verde", "cape verde"); alias("NZ", "nzl");
alias("CUW", "cuw", "curaçao"); alias("KSA", "ksa", "sau");

function resolveCode(team) {
  if (!team) return null;
  const keys = [team.abbreviation, team.displayName, team.shortDisplayName, team.name, team.location]
    .filter(Boolean).map((s) => String(s).toLowerCase().trim());
  for (const k of keys) if (SYN[k]) return SYN[k];
  return null;
}

function classifyLabel(label) {
  const l = String(label || "").toLowerCase();
  if (l.includes("group")) return "GROUP";
  if (l.includes("32")) return "R32";
  if (l.includes("16")) return "R16";
  if (l.includes("quarter")) return "QF";
  if (l.includes("semi")) return "SF";       // before "final" (semifinal contains "final")
  if (l.includes("3rd") || l.includes("third")) return "THIRD";
  if (l.includes("final")) return "FINAL";
  return "GROUP";
}

function parseEvents(json) {
  const entries = json?.leagues?.[0]?.calendar?.[0]?.entries || [];
  const windows = entries.map((e) => ({
    start: new Date(e.startDate), end: new Date(e.endDate), type: classifyLabel(e.label),
  }));
  const roundOf = (dateStr) => {
    const d = new Date(dateStr);
    const w = windows.find((w) => d >= w.start && d < w.end);
    return w ? w.type : "GROUP";
  };

  const groupAcc = {}, fixtures = {}, koGoals = {}, logs = {}, schedule = [];
  let finalWinner = null, thirdWinner = null;
  const nameOf = (team, code) => code ? TEAMS[code].name : (team?.displayName || team?.shortDisplayName || team?.name || "TBD");

  for (const ev of json?.events || []) {
    const comp = ev.competitions?.[0];
    if (!comp) continue;
    const completed = comp.status?.type?.completed === true || comp.status?.type?.state === "post";
    const cs = comp.competitors || [];
    if (cs.length < 2) continue;
    const [A, B] = cs;
    const ca = resolveCode(A.team), cb = resolveCode(B.team);
    const sa = parseInt(A.score, 10), sb = parseInt(B.score, 10);
    const round = roundOf(ev.date);
    const haveScore = Number.isFinite(sa) && Number.isFinite(sb);

    const pushLog = (code, oppTeam, oppCode, gf, ga, isWinner) => {
      if (!code) return;
      (logs[code] = logs[code] || []).push({
        round, date: ev.date, opp: nameOf(oppTeam, oppCode), oppCode: oppCode || null,
        gf: haveScore ? gf : null, ga: haveScore ? ga : null,
        completed: !!completed && haveScore, adv: isWinner === true,
      });
    };
    pushLog(ca, B.team, cb, sa, sb, A.winner);
    pushLog(cb, A.team, ca, sb, sa, B.winner);

    schedule.push({
      date: ev.date, round,
      completed: !!completed && haveScore,
      home: { code: ca, name: nameOf(A.team, ca), score: haveScore ? sa : null, win: A.winner === true },
      away: { code: cb, name: nameOf(B.team, cb), score: haveScore ? sb : null, win: B.winner === true },
    });

    if (round === "GROUP") {
      if (completed && haveScore) {
        if (ca) (groupAcc[ca] = groupAcc[ca] || []).push({ gf: String(sa), ga: String(sb) });
        if (cb) (groupAcc[cb] = groupAcc[cb] || []).push({ gf: String(sb), ga: String(sa) });
      }
    } else {
      [ca, cb].forEach((c) => { if (c) (fixtures[c] = fixtures[c] || new Set()).add(round); });
      if (completed) {
        if (haveScore) {
          if (ca) { koGoals[ca] = koGoals[ca] || { gf: 0, ga: 0 }; koGoals[ca].gf += sa; koGoals[ca].ga += sb; }
          if (cb) { koGoals[cb] = koGoals[cb] || { gf: 0, ga: 0 }; koGoals[cb].gf += sb; koGoals[cb].ga += sa; }
        }
        const w = cs.find((x) => x.winner === true);
        const wc = w ? resolveCode(w.team) : null;
        if (round === "FINAL" && wc) finalWinner = wc;
        if (round === "THIRD" && wc) thirdWinner = wc;
      }
    }
  }

  const RANK = { R32: 1, R16: 2, QF: 3, SF: 4 };
  const LAB = { 1: "R32", 2: "R16", 3: "QF", 4: "SF" };

  // Real World Cup groups inferred from who plays whom in the group stage
  const grpStats = (code) => {
    let p = 0, gd = 0, gf = 0, pl = 0;
    (groupAcc[code] || []).forEach((m) => { const a = +m.gf, b = +m.ga; pl++; gf += a; gd += a - b; if (a > b) p += 3; else if (a === b) p += 1; });
    return { p, gd, gf, pl };
  };
  const groupMatesOf = (code) => {
    const s = new Set([code]);
    (logs[code] || []).forEach((m) => { if (m.round === "GROUP" && m.oppCode) s.add(m.oppCode); });
    return [...s];
  };
  const groupPosOf = (code) => {
    if (grpStats(code).pl === 0) return 0;
    const members = groupMatesOf(code).map((c) => ({ c, s: grpStats(c) }));
    members.sort((x, y) => y.s.p - x.s.p || y.s.gd - x.s.gd || y.s.gf - x.s.gf);
    return members.findIndex((m) => m.c === code) + 1;
  };

  const out = {};
  Object.keys(TEAMS).forEach((code) => {
    const g = [{ gf: "", ga: "" }, { gf: "", ga: "" }, { gf: "", ga: "" }];
    (groupAcc[code] || []).slice(0, 3).forEach((m, i) => { g[i] = m; });
    let stage = "GROUP";
    const fx = fixtures[code];
    if (fx) {
      if (fx.has("FINAL")) stage = finalWinner === code ? "CHAMPION" : "FINAL";
      else if (fx.has("THIRD")) stage = thirdWinner === code ? "THIRD" : "SF";
      else {
        let mx = 0;
        ["R32", "R16", "QF", "SF"].forEach((r) => { if (fx.has(r) && RANK[r] > mx) mx = RANK[r]; });
        stage = mx ? LAB[mx] : "GROUP";
      }
    }
    const kg = koGoals[code] || { gf: 0, ga: 0 };
    const matches = (logs[code] || []).slice().sort((a, b) => new Date(a.date) - new Date(b.date));

    const groupPos = groupPosOf(code);
    const groupComplete = (groupAcc[code] || []).length >= 3;
    const hasUpcoming = matches.some((m) => !m.completed);
    const playedAny = matches.some((m) => m.completed);
    const koMatches = matches.filter((m) => m.round !== "GROUP" && m.completed);
    const lastKO = koMatches.length ? koMatches[koMatches.length - 1] : null;
    const terminal = stage === "CHAMPION" || stage === "FINAL" || stage === "THIRD";
    let alive;
    if (stage === "CHAMPION") alive = false;
    else if (hasUpcoming) alive = true;
    else if (lastKO && lastKO.adv && !terminal) alive = true; // won last KO, next round pending
    else if (stage === "GROUP" && groupComplete && (groupPos === 1 || groupPos === 2)) alive = true;
    else if (!playedAny) alive = true; // tournament not started
    else alive = false;
    const eliminated = stage !== "CHAMPION" && !alive;

    out[code] = { g, stage, koGF: kg.gf, koGA: kg.ga, matches, groupPos, eliminated };
  });
  schedule.sort((a, b) => new Date(a.date) - new Date(b.date));
  schedule.forEach((m, i) => { m.matchNo = i + 1; });
  return { teams: out, schedule };
}

async function syncFromESPN() {
  const res = await fetch(ESPN_URL, { headers: { accept: "application/json" } });
  if (!res.ok) throw new Error("ESPN responded " + res.status);
  return parseEvents(await res.json());
}

/*  SCORING                                                            */
/* ------------------------------------------------------------------ */

const blankResult = () => ({
  g: [{ gf: "", ga: "" }, { gf: "", ga: "" }, { gf: "", ga: "" }],
  stage: "GROUP",
  koGF: 0,
  koGA: 0,
  matches: [],
});

function num(v) {
  const n = parseInt(v, 10);
  return Number.isFinite(n) ? n : null;
}

function teamScore(res, tier) {
  const r = res || blankResult();
  const w = WIN_PTS[tier] || 3;
  let pts = 0, gf = 0, ga = 0, wins = 0, draws = 0, losses = 0, cleanSheets = 0, played = 0;

  r.g.forEach((m) => {
    const a = num(m.gf), b = num(m.ga);
    if (a === null || b === null) return;
    played += 1; gf += a; ga += b;
    if (b === 0) cleanSheets += 1;
    if (a > b) { wins += 1; pts += w; }
    else if (a === b) { draws += 1; pts += 1; } // draw point: group stage only
    else { losses += 1; }
  });

  const koWins = KO_WINS[r.stage] || 0;
  pts += koWins * w;                       // knockout wins, tier-weighted
  pts += ROUND_BONUS[r.stage] || 0;        // round-reached bonus
  if (r.stage !== "GROUP") pts += REACH_KO_BONUS; // breadth: made the knockouts
  pts += PLACEMENT_BONUS[r.stage] || 0;    // finals placement

  gf += r.koGF || 0;
  ga += r.koGA || 0;

  return { pts, gf, ga, gd: gf - ga, wins: wins + koWins, draws, losses, cleanSheets, played, stage: r.stage };
}

function managerScore(squad, results) {
  let pts = 0, gf = 0, ga = 0, cleanSheets = 0, wins = 0;
  squad.forEach((code) => {
    const s = teamScore(results[code], TEAMS[code].tier);
    pts += s.pts; gf += s.gf; ga += s.ga; cleanSheets += s.cleanSheets; wins += s.wins;
  });
  return { pts, gf, ga, gd: gf - ga, cleanSheets, wins };
}

const STORE_KEY = "legacy-league-v1";

async function loadData() {
  try {
    const r = localStorage.getItem(STORE_KEY);
    if (r) return JSON.parse(r);
  } catch (e) {}
  return null;
}
async function saveData(data) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(data)); } catch (e) {}
}

  bg2: "#0d1424",
  card: "#111a2c",
  cardHi: "#16223a",
  border: "rgba(255,255,255,0.07)",
  gold: "#d4a017",
  goldBright: "#e8be4a",
  text: "#e9eef7",
  mut: "#8492a8",
  mut2: "#5f6e85",
  red: "#e0566e",
};

function Flag({ code, size = 22 }) {
  const t = TEAMS[code];
  return <span style={{ fontSize: size, lineHeight: 1 }} title={t?.name}>{t?.flag}</span>;
}

function TierPill({ tier, small }) {
  const m = TIER_META[tier];
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: 6,
      border: `1px solid ${m.color}`, color: m.color, background: m.bg,
      borderRadius: 999, padding: small ? "1px 9px" : "3px 12px",
      fontSize: small ? 11 : 12, fontWeight: 700, letterSpacing: 0.3, whiteSpace: "nowrap",
    }}>{`Tier ${tier}`}</span>
  );
}

function Card({ children, style }) {
  return (
    <div style={{
      background: C.card, border: `1px solid ${C.border}`, borderRadius: 16,
      padding: 18, ...style,
    }}>{children}</div>
  );
}

function SectionTitle({ icon, children }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
      {icon && <span style={{ fontSize: 20 }}>{icon}</span>}
      <h3 style={{
        margin: 0, color: C.gold, fontSize: 14, fontWeight: 800,
        letterSpacing: 1.2, textTransform: "uppercase",
      }}>{children}</h3>
    </div>
  );
}

function ManagerNames({ i, size = 13, gap = 2 }) {
  const m = MANAGERS[i] || {};
  return (
    <div style={{ display: "grid", gap }}>
      {DIVISIONS.map((d) => (
        <div key={d.key} style={{ display: "flex", alignItems: "center", gap: 7 }}>
          <span style={{ width: 7, height: 7, borderRadius: 99, background: d.color, flexShrink: 0 }} />
          <span style={{ color: d.color, fontSize: size, fontWeight: 700 }}>{m[d.key]}</span>
        </div>
      ))}
    </div>
  );
}

function PointsTab({ results, api, onSelect }) {
  const rows = useMemo(() =>
    Object.keys(TEAMS)
      .map((code) => ({ code, tier: TEAMS[code].tier, pts: teamScore(results[code], TEAMS[code].tier).pts }))
      .sort((a, b) => b.pts - a.pts || a.tier - b.tier || TEAMS[a.code].name.localeCompare(TEAMS[b.code].name)),
  [results]);
  return (
    <div style={{ display: "grid", gap: 8 }}>
      <SectionTitle icon="⚽">Team Points</SectionTitle>
      <div style={{ color: C.mut2, fontSize: 12.5, marginTop: -4, marginBottom: 2 }}>
        Points each nation has earned for its managers. Tap a team to see all its results.
      </div>
      {rows.map((r, idx) => {
        const s = statusOf(api[r.code] || results[r.code]);
        const nameCol = s.elim ? C.red : s.gold ? C.goldBright : C.text;
        const statusCol = s.elim ? C.red : s.gold ? C.goldBright : C.mut2;
        return (
          <button key={r.code} onClick={() => onSelect(r.code)} style={{
            display: "flex", alignItems: "center", gap: 10, width: "100%", textAlign: "left",
            background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: "10px 14px", cursor: "pointer",
          }}>
            <span style={{ width: 20, color: C.mut2, fontSize: 12, fontWeight: 700, textAlign: "right" }}>{idx + 1}</span>
            <Flag code={r.code} size={20} />
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ color: nameCol, fontSize: 14.5, fontWeight: 600, textDecoration: s.elim ? "line-through" : "none" }}>{TEAMS[r.code].name}</div>
              {s.label && <div style={{ color: statusCol, fontSize: 11, marginTop: 1 }}>{s.label}</div>}
            </div>
            <TierPill tier={r.tier} small />
            <span style={{ color: C.goldBright, fontWeight: 800, fontSize: 18, minWidth: 28, textAlign: "right" }}>{r.pts}</span>
            <span style={{ color: C.mut2, fontSize: 13 }}>›</span>
          </button>
        );
      })}
    </div>
  );
}

function fmtDate(iso) {
  try { return new Date(iso).toLocaleDateString([], { month: "short", day: "numeric" }); }
  catch (e) { return ""; }
}

function TeamDetail({ code, api, results, onClose }) {
  if (!code) return null;
  const t = TEAMS[code];
  const sc = teamScore(results[code], t.tier);
  const matches = (api[code] && api[code].matches) || [];
  const s = statusOf(api[code] || results[code]);
  const nameCol = s.elim ? C.red : s.gold ? C.goldBright : C.text;
  const anyPens = matches.some((m) => m.completed && m.round !== "GROUP" && m.gf === m.ga);
  return (
    <div onClick={onClose} style={{
      position: "fixed", inset: 0, background: "rgba(0,0,0,0.65)", zIndex: 60,
      display: "flex", alignItems: "flex-end", justifyContent: "center",
    }}>
      <div onClick={(e) => e.stopPropagation()} style={{
        background: C.bg2, border: `1px solid ${C.border}`, borderTopLeftRadius: 18, borderTopRightRadius: 18,
        width: "100%", maxWidth: 560, maxHeight: "82vh", overflowY: "auto", padding: 18,
        boxShadow: "0 -10px 40px rgba(0,0,0,0.5)",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 11, marginBottom: 14 }}>
          <Flag code={code} size={30} />
          <div style={{ flex: 1 }}>
            <div style={{ color: nameCol, fontWeight: 800, fontSize: 18, lineHeight: 1.1, textDecoration: s.elim ? "line-through" : "none" }}>{t.name}</div>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 4 }}>
              <TierPill tier={t.tier} small />
              <span style={{ color: s.elim ? C.red : C.mut2, fontSize: 12 }}>{s.label || STAGE_DESC[sc.stage]}{s.elim ? " · eliminated" : ""}</span>
            </div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ color: C.goldBright, fontWeight: 800, fontSize: 24, lineHeight: 1 }}>{sc.pts}</div>
            <div style={{ color: C.mut2, fontSize: 11 }}>points</div>
          </div>
          <button onClick={onClose} style={{
            background: "transparent", border: `1px solid ${C.border}`, color: C.mut,
            borderRadius: 8, width: 30, height: 30, cursor: "pointer", fontSize: 14, flexShrink: 0,
          }}>✕</button>
        </div>

        {matches.length === 0 ? (
          <div style={{ color: C.mut2, fontSize: 13, padding: "12px 2px" }}>
            No games recorded yet — results appear here once matches kick off and the feed syncs.
          </div>
        ) : (
          <>
            <div style={{ color: C.mut2, fontSize: 11, fontWeight: 700, letterSpacing: 0.5, textTransform: "uppercase", margin: "2px 2px 6px" }}>
              How the points add up
            </div>
            <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: "4px 14px" }}>
              {matches.map((m, i) => {
                const played = m.completed;
                let res = "", col = C.mut2;
                if (played) {
                  if (m.round === "GROUP") res = m.gf > m.ga ? "W" : m.gf === m.ga ? "D" : "L";
                  else res = m.adv ? "W" : "L";
                  col = res === "W" ? "#46a865" : res === "D" ? "#c9a23a" : "#cf6690";
                }
                const pens = played && m.round !== "GROUP" && m.gf === m.ga;
                const tp = teamMatchPoints(code, m);
                return (
                  <div key={i} style={{ padding: "10px 0", borderTop: i ? `1px solid ${C.border}` : "none" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <div style={{ width: 90, flexShrink: 0 }}>
                        <div style={{ color: C.mut, fontSize: 11, fontWeight: 700 }}>{ROUND_LABEL[m.round]}</div>
                        <div style={{ color: C.mut2, fontSize: 10.5 }}>{fmtDate(m.date)}</div>
                      </div>
                      <div style={{ flex: 1, display: "flex", alignItems: "center", gap: 6, color: C.text, fontSize: 13, minWidth: 0 }}>
                        <span style={{ color: C.mut2 }}>vs</span>
                        {m.oppCode && <Flag code={m.oppCode} size={15} />}
                        <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{m.opp}</span>
                      </div>
                      {played ? (
                        <>
                          <span style={{ color: C.text, fontWeight: 700, fontSize: 14 }}>{m.gf}–{m.ga}{pens ? "*" : ""}</span>
                          <span style={{ width: 18, textAlign: "center", color: col, fontWeight: 800, fontSize: 13 }}>{res}</span>
                        </>
                      ) : (
                        <span style={{ color: C.mut2, fontSize: 12 }}>upcoming</span>
                      )}
                    </div>
                    {tp && (
                      <div style={{ marginTop: 4, marginLeft: 100, fontSize: 11.5 }}>
                        <span style={{ color: tp.pts > 0 ? "#46a865" : C.mut2, fontWeight: 700 }}>
                          {tp.pts > 0 ? `+${tp.pts}` : "0"} pts
                        </span>
                        <span style={{ color: C.mut2 }}>{"  ·  "}{tp.detail}</span>
                      </div>
                    )}
                  </div>
                );
              })}
              <div style={{
                display: "flex", justifyContent: "space-between", alignItems: "center",
                padding: "10px 0", borderTop: `1px solid ${C.gold}55`, marginTop: 2,
              }}>
                <span style={{ color: C.text, fontWeight: 700, fontSize: 13 }}>Total</span>
                <span style={{ color: C.goldBright, fontWeight: 800, fontSize: 16 }}>{sc.pts} pts</span>
              </div>
            </div>
          </>
        )}
        {anyPens && <div style={{ color: C.mut2, fontSize: 11, marginTop: 8 }}>* advanced on penalties</div>}
      </div>
    </div>
  );
}

function CollapsibleSection({ title, open, onToggle, children }) {
  return (
    <div>
      <button onClick={onToggle} style={{
        width: "100%", display: "flex", alignItems: "center", gap: 10,
        background: C.card, border: `1px solid ${C.border}`, borderRadius: 12,
        cursor: "pointer", padding: "14px 16px",
      }}>
        <span style={{ flex: 1, textAlign: "left", color: C.gold, fontSize: 14, fontWeight: 800, letterSpacing: 1.2, textTransform: "uppercase" }}>{title}</span>
        <span style={{ color: C.mut, fontSize: 15, transform: open ? "rotate(90deg)" : "none", transition: "transform .15s" }}>›</span>
      </button>
      {open && <div style={{ marginTop: 10, display: "grid", gap: 12 }}>{children}</div>}
    </div>
  );
}

const ADV_BONUS = { R32: 2, R16: 4, QF: 6, SF: 8, THIRD: 2, FINAL: 8 };
// Points THIS team earned from a single completed match (incl. milestone bonuses)
function teamMatchPoints(code, m) {
  if (!m.completed) return null;
  const W = WIN_PTS[TEAMS[code].tier] || 3;
  if (m.round === "GROUP") {
    if (m.gf > m.ga) return { pts: W, detail: `${W} win` };
    if (m.gf === m.ga) return { pts: 1, detail: "draw" };
    return { pts: 0, detail: "loss" };
  }
  if (m.round === "R32") {
    return m.adv ? { pts: 3 + W + 2, detail: `+3 reached KO, ${W} win, +2 advance` } : { pts: 3, detail: "+3 reached knockouts" };
  }
  if (m.round === "FINAL") {
    return m.adv ? { pts: W + 8, detail: `${W} win, +8 champion 🏆` } : { pts: 4, detail: "+4 runner-up" };
  }
  if (m.round === "THIRD") {
    return m.adv ? { pts: W + 2, detail: `${W} win, +2 third place 🥉` } : { pts: 0, detail: "4th place" };
  }
  const adv = ADV_BONUS[m.round] || 0;
  return m.adv ? { pts: W + adv, detail: `${W} win, +${adv} advance` } : { pts: 0, detail: "lost" };
}

// Shows the gold/silver/bronze managers who own a team, with a dot in their division color.
function TeamOwners({ code, align }) {
  const i = TEAM_SQUAD[code];
  if (i == null) return null;
  const m = MANAGERS[i];
  return (
    <div style={{ display: "flex", flexWrap: "wrap", gap: 6, justifyContent: align }}>
      {DIVISIONS.map((d) => (
        <span key={d.key} style={{ display: "inline-flex", alignItems: "center", gap: 3, fontSize: 10.5, color: C.mut2, whiteSpace: "nowrap" }}>
          <span style={{ width: 6, height: 6, borderRadius: 99, background: d.color, flexShrink: 0 }} />
          {m[d.key]}
        </span>
      ))}
    </div>
  );
}

function MatchRow({ m }) {
  const dt = (() => {
    try {
      return new Date(m.date).toLocaleString("en-US", {
        timeZone: "America/Chicago", weekday: "short", month: "short", day: "numeric", hour: "numeric", minute: "2-digit",
      }) + " CT";
    } catch (e) { return ""; }
  })();
  const Side = ({ s, right }) => (
    <div style={{
      flex: 1, display: "flex", alignItems: "center", gap: 6, minWidth: 0,
      justifyContent: right ? "flex-end" : "flex-start",
      color: m.completed && s.win ? C.text : C.mut, fontWeight: m.completed && s.win ? 800 : 600, fontSize: 13,
    }}>
      {right && <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", textAlign: "right" }}>{s.name}</span>}
      {s.code ? <Flag code={s.code} size={16} /> : <span style={{ fontSize: 14 }}>•</span>}
      {!right && <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{s.name}</span>}
    </div>
  );
  return (
    <Card style={{ padding: 12 }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
        <span style={{ color: C.gold, fontSize: 11, fontWeight: 800, letterSpacing: 0.5 }}>
          Match {m.matchNo} <span style={{ color: C.mut2, fontWeight: 600 }}>· {ROUND_LABEL[m.round] || ""}</span>
        </span>
        <span style={{ color: C.mut2, fontSize: 11 }}>{dt}</span>
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        <Side s={m.home} right={false} />
        <span style={{
          flexShrink: 0, minWidth: 46, textAlign: "center", fontWeight: 800, fontSize: 14,
          color: m.completed ? C.text : C.mut2,
        }}>
          {m.completed ? `${m.home.score}\u2013${m.away.score}` : "vs"}
        </span>
        <Side s={m.away} right={true} />
      </div>
      <div style={{ display: "flex", alignItems: "flex-start", gap: 8, marginTop: 6 }}>
        <div style={{ flex: 1, minWidth: 0 }}><TeamOwners code={m.home.code} align="flex-start" /></div>
        <span style={{ flexShrink: 0, width: 46 }} />
        <div style={{ flex: 1, minWidth: 0 }}><TeamOwners code={m.away.code} align="flex-end" /></div>
      </div>
    </Card>
  );
}

function GameLogTab({ schedule }) {
  const [openPast, setOpenPast] = useState(false);
  const [openToday, setOpenToday] = useState(true);
  const [openFuture, setOpenFuture] = useState(false);

  const ctDay = (iso) => { try { return new Date(iso).toLocaleDateString("en-CA", { timeZone: "America/Chicago" }); } catch (e) { return ""; } };
  const today = new Date().toLocaleDateString("en-CA", { timeZone: "America/Chicago" });

  const past = [], todayG = [], future = [];
  (schedule || []).forEach((m) => {
    const d = ctDay(m.date);
    if (!d) return;
    if (d < today) past.push(m);
    else if (d === today) todayG.push(m);
    else future.push(m);
  });

  return (
    <div style={{ display: "grid", gap: 12 }}>
      <SectionTitle icon="📅">Game Log</SectionTitle>
      <div style={{ color: C.mut2, fontSize: 12.5, marginTop: -4 }}>
        All 104 matches, numbered in order, with kickoff times in Central. Matchups fill in as the bracket is set; results appear once games finish.
      </div>

      {(!schedule || schedule.length === 0) && (
        <Card style={{ padding: 16 }}>
          <span style={{ color: C.mut2, fontSize: 13 }}>Syncing the schedule from ESPN — tap “Sync now” up top if this stays empty.</span>
        </Card>
      )}

      <CollapsibleSection title={`Past (${past.length})`} open={openPast} onToggle={() => setOpenPast((o) => !o)}>
        {past.length ? past.map((m) => <MatchRow key={m.matchNo} m={m} />) : <Card style={{ padding: 12 }}><span style={{ color: C.mut2, fontSize: 13 }}>No completed match days yet.</span></Card>}
      </CollapsibleSection>

      <CollapsibleSection title={`Today (${todayG.length})`} open={openToday} onToggle={() => setOpenToday((o) => !o)}>
        {todayG.length ? todayG.map((m) => <MatchRow key={m.matchNo} m={m} />) : <Card style={{ padding: 12 }}><span style={{ color: C.mut2, fontSize: 13 }}>No matches scheduled today.</span></Card>}
      </CollapsibleSection>

      <CollapsibleSection title={`Future (${future.length})`} open={openFuture} onToggle={() => setOpenFuture((o) => !o)}>
        {future.length ? future.map((m) => <MatchRow key={m.matchNo} m={m} />) : <Card style={{ padding: 12 }}><span style={{ color: C.mut2, fontSize: 13 }}>No upcoming matches.</span></Card>}
      </CollapsibleSection>
    </div>
  );
}

/* ------------------------------------------------------------------ */
/*  ROOT                                                               */
/* ------------------------------------------------------------------ */

const TABS = [
  { key: "standings", label: "Standings",      icon: "📊" },
  { key: "points",    label: "Results by Nation", icon: "⚽" },
  { key: "gamelog",  label: "Game Log",        icon: "📅" },
  { key: "teams",     label: "Teams",          icon: "👥" },
  { key: "rules",     label: "Rules",          icon: "📋" },
];

function App() {
  const [tab, setTab] = useState("standings");
  const [selected, setSelected] = useState(null);
  const [api, setApi] = useState({});          // ESPN-derived per-team results
  const [schedule, setSchedule] = useState([]); // full match list
  const [loaded, setLoaded] = useState(false);
  const [sync, setSync] = useState({ status: "idle", at: null, msg: "" });

  // Load saved state
  useEffect(() => {
    loadData().then((d) => {
      if (d) {
        setApi(d.api || {});
        setSchedule(d.schedule || []);
        if (d.lastSync) setSync({ status: "idle", at: d.lastSync, msg: "" });
      }
      setLoaded(true);
    });
  }, []);

  // Persist
  useEffect(() => {
    if (loaded) saveData({ api, schedule, lastSync: sync.at });
  }, [api, schedule, sync.at, loaded]);

  const doSync = React.useCallback(async () => {
    setSync((s) => ({ ...s, status: "loading" }));
    try {
      const data = await syncFromESPN();
      setApi(data.teams);
      setSchedule(data.schedule);
      setSync({ status: "ok", at: Date.now(), msg: "" });
    } catch (e) {
      setSync((s) => ({ status: "error", at: s.at, msg: String(e.message || e) }));
    }
  }, []);

  // Auto-sync on load + every 5 minutes
  useEffect(() => {
    if (!loaded) return;
    doSync();
    const id = setInterval(doSync, 5 * 60 * 1000);
    return () => clearInterval(id);
  }, [loaded, doSync]);

  const results = useMemo(() => {
    const out = {};
    Object.keys(TEAMS).forEach((c) => { out[c] = api[c] || blankResult(); });
    return out;
  }, [api]);

  const syncColor = { idle: C.mut, loading: C.mut, ok: "#3f9c5b", error: "#c2547f" }[sync.status];
  const syncText = sync.status === "loading" ? "Syncing from ESPN…"
    : sync.status === "error" ? "Couldn't reach ESPN — using saved data"
    : sync.at ? `Synced ${new Date(sync.at).toLocaleString([], { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" })}`
    : "Not synced yet";

  return (
    <div style={{
      minHeight: "100vh", background: `radial-gradient(1200px 600px at 50% -10%, ${C.bg2}, ${C.bg})`,
      fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif", color: C.text,
    }}>
      <div style={{ maxWidth: 560, margin: "0 auto", padding: "20px 16px 60px" }}>
        {/* Header */}
        <div style={{ textAlign: "center", paddingBottom: 14, borderBottom: `1px solid ${C.gold}55`, marginBottom: 14 }}>
          <div style={{ fontSize: 24, letterSpacing: 4 }}>🏆 🌍 ⚽</div>
          <h1 style={{
            color: C.gold, margin: "8px 0 4px", fontSize: 30, fontWeight: 900, letterSpacing: 2,
          }}>THE LEGACY LEAGUE</h1>
          <div style={{ color: C.mut, fontSize: 11, letterSpacing: 3, fontWeight: 600 }}>
            WORLD CUP 2026 · FANTASY FOOTBALL DRAFT
          </div>
        </div>

        {/* Sync bar */}
        <div style={{
          display: "flex", alignItems: "center", gap: 10, marginBottom: 16,
          background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: "9px 12px",
        }}>
          <span style={{ width: 8, height: 8, borderRadius: 99, background: syncColor, flexShrink: 0 }} />
          <span style={{ flex: 1, color: C.mut, fontSize: 12.5 }}>{syncText}</span>
          <button onClick={doSync} disabled={sync.status === "loading"} style={{
            background: "transparent", border: `1px solid ${C.gold}66`, color: C.goldBright,
            borderRadius: 8, padding: "5px 12px", fontSize: 12.5, fontWeight: 700,
            cursor: sync.status === "loading" ? "default" : "pointer", opacity: sync.status === "loading" ? 0.5 : 1,
          }}>Sync now</button>
        </div>

        {/* Tabs */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 4, marginBottom: 20 }}>
          {TABS.map((t) => {
            const active = tab === t.key;
            return (
              <button key={t.key} onClick={() => setTab(t.key)} style={{
                display: "flex", flexDirection: "column", alignItems: "center", gap: 4,
                background: active ? C.cardHi : "transparent",
                border: "none", borderBottom: active ? `2px solid ${C.gold}` : "2px solid transparent",
                borderRadius: 8, padding: "10px 2px", cursor: "pointer",
                color: active ? C.gold : C.mut, fontWeight: active ? 800 : 600,
              }}>
                <span style={{ fontSize: 18 }}>{t.icon}</span>
                <span style={{ fontSize: 11, letterSpacing: 0.3, textTransform: "uppercase", textAlign: "center", lineHeight: 1.1 }}>{t.label}</span>
              </button>
            );
          })}
        </div>

        {tab === "rules" && <RulesTab />}
        {tab === "standings" && <StandingsTab results={results} />}
        {tab === "teams" && <TeamsTab api={api} onSelect={setSelected} />}
        {tab === "points" && <PointsTab results={results} api={api} onSelect={setSelected} />}
        {tab === "gamelog" && <GameLogTab schedule={schedule} />}
      </div>

      <TeamDetail code={selected} api={api} results={results} onClose={() => setSelected(null)} />
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script></body></html>
